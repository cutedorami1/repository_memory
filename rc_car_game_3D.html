<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>3D Formula RC Racing Game</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #020617;
    font-family: Arial, sans-serif;
  }

  #ui {
    position: fixed;
    top: 15px;
    left: 20px;
    color: white;
    z-index: 10;
    font-size: 18px;
    line-height: 1.6;
    background: rgba(15, 23, 42, 0.55);
    padding: 10px 16px;
    border-radius: 12px;
  }

  #help {
    position: fixed;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: #cbd5e1;
    background: rgba(15, 23, 42, 0.75);
    padding: 10px 18px;
    border-radius: 12px;
    font-size: 15px;
  }

  #gameOver {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    color: white;
    z-index: 20;
    text-align: center;
    padding-top: 260px;
    font-size: 40px;
  }

  #gameOver span {
    font-size: 20px;
    color: #cbd5e1;
  }
</style>
</head>

<body>
<div id="ui">
  🏁 SCORE : <span id="score">0</span><br>
  🏎 SPEED : <span id="speed">0</span> km/h
</div>

<div id="help">
  방향키 ← → 조향 / ↑ 가속 / ↓ 감속 / Enter 재시작
</div>

<div id="gameOver">
  GAME OVER<br>
  <span>Enter 키를 누르면 다시 시작</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let car;
let keys = {};
let obstacles = [];
let score = 0;
let speed = 0.28;
let gameOver = false;

const scoreText = document.getElementById("score");
const speedText = document.getElementById("speed");
const gameOverText = document.getElementById("gameOver");

init();
animate();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x9fb7c9);
  scene.fog = new THREE.Fog(0x9fb7c9, 35, 140);

  camera = new THREE.PerspectiveCamera(
    72,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  const hemi = new THREE.HemisphereLight(0xffffff, 0x334155, 1.4);
  scene.add(hemi);

  const sun = new THREE.DirectionalLight(0xffffff, 2.2);
  sun.position.set(-6, 15, 8);
  sun.castShadow = true;
  scene.add(sun);

  createTrack();
  createFormulaCar();
  createEnvironment();

  setInterval(() => {
    if (!gameOver) createObstacle();
  }, 1300);

  document.addEventListener("keydown", e => {
    keys[e.key] = true;
    if (gameOver && e.key === "Enter") restart();
  });

  document.addEventListener("keyup", e => keys[e.key] = false);
  window.addEventListener("resize", resize);
}

function createTrack() {
  const roadMat = new THREE.MeshStandardMaterial({
    color: 0x6b7280,
    roughness: 0.82,
    metalness: 0.05
  });

  const road = new THREE.Mesh(
    new THREE.BoxGeometry(13, 0.08, 300),
    roadMat
  );
  road.position.set(0, -0.04, -100);
  road.receiveShadow = true;
  scene.add(road);

  const grassMat = new THREE.MeshStandardMaterial({ color: 0x3f7f2f });

  const leftGrass = new THREE.Mesh(
    new THREE.BoxGeometry(35, 0.05, 300),
    grassMat
  );
  leftGrass.position.set(-24, -0.08, -100);
  scene.add(leftGrass);

  const rightGrass = leftGrass.clone();
  rightGrass.position.x = 24;
  scene.add(rightGrass);

  const wallMat = new THREE.MeshStandardMaterial({ color: 0xd1d5db });

  const leftWall = new THREE.Mesh(
    new THREE.BoxGeometry(0.45, 1.3, 300),
    wallMat
  );
  leftWall.position.set(-7.3, 0.6, -100);
  scene.add(leftWall);

  const rightWall = leftWall.clone();
  rightWall.position.x = 7.3;
  scene.add(rightWall);

  for (let i = 0; i < 45; i++) {
    const line = new THREE.Mesh(
      new THREE.BoxGeometry(0.12, 0.03, 4),
      new THREE.MeshStandardMaterial({ color: 0xffffff })
    );
    line.position.set(-3.2, 0.03, -i * 7);
    line.name = "roadLine";
    scene.add(line);

    const line2 = line.clone();
    line2.position.x = 3.2;
    line2.name = "roadLine";
    scene.add(line2);
  }
}

function createFormulaCar() {
  car = new THREE.Group();

  const white = new THREE.MeshStandardMaterial({
    color: 0xf8fafc,
    roughness: 0.32,
    metalness: 0.35
  });

  const black = new THREE.MeshStandardMaterial({
    color: 0x020617,
    roughness: 0.45,
    metalness: 0.45
  });

  const red = new THREE.MeshStandardMaterial({
    color: 0xef1f1f,
    roughness: 0.28,
    metalness: 0.45
  });

  const yellow = new THREE.MeshStandardMaterial({
    color: 0xfacc15,
    roughness: 0.35,
    metalness: 0.25
  });

  const glass = new THREE.MeshStandardMaterial({
    color: 0x111827,
    roughness: 0.12,
    metalness: 0.55
  });

  const mainBody = new THREE.Mesh(
    new THREE.BoxGeometry(1.25, 0.45, 5.1),
    white
  );
  mainBody.position.y = 0.55;
  mainBody.castShadow = true;
  car.add(mainBody);

  const nose = new THREE.Mesh(
    new THREE.BoxGeometry(0.55, 0.25, 3.6),
    white
  );
  nose.position.set(0, 0.5, -3.3);
  nose.castShadow = true;
  car.add(nose);

  const cockpit = new THREE.Mesh(
    new THREE.BoxGeometry(1.1, 0.55, 1.15),
    glass
  );
  cockpit.position.set(0, 0.92, -0.15);
  cockpit.castShadow = true;
  car.add(cockpit);

  const halo = new THREE.Mesh(
    new THREE.TorusGeometry(0.55, 0.045, 10, 40),
    black
  );
  halo.rotation.x = Math.PI / 2;
  halo.position.set(0, 1.22, -0.25);
  car.add(halo);

  const frontWing = new THREE.Mesh(
    new THREE.BoxGeometry(4.3, 0.12, 0.55),
    red
  );
  frontWing.position.set(0, 0.32, -5.1);
  car.add(frontWing);

  const rearWing = new THREE.Mesh(
    new THREE.BoxGeometry(4.1, 0.18, 0.65),
    black
  );
  rearWing.position.set(0, 1.15, 2.75);
  car.add(rearWing);

  const rearWingLeg1 = new THREE.Mesh(
    new THREE.BoxGeometry(0.12, 0.8, 0.12),
    black
  );
  rearWingLeg1.position.set(-0.55, 0.75, 2.55);
  car.add(rearWingLeg1);

  const rearWingLeg2 = rearWingLeg1.clone();
  rearWingLeg2.position.x = 0.55;
  car.add(rearWingLeg2);

  const leftMirror = new THREE.Mesh(
    new THREE.BoxGeometry(0.65, 0.18, 0.32),
    red
  );
  leftMirror.position.set(-1.15, 0.95, -1.25);
  car.add(leftMirror);

  const rightMirror = leftMirror.clone();
  rightMirror.position.x = 1.15;
  car.add(rightMirror);

  const sidePodL = new THREE.Mesh(
    new THREE.BoxGeometry(1.05, 0.35, 1.7),
    yellow
  );
  sidePodL.position.set(-1.05, 0.55, 0.45);
  car.add(sidePodL);

  const sidePodR = sidePodL.clone();
  sidePodR.position.x = 1.05;
  car.add(sidePodR);

  createWheel(-2.0, 0.5, -2.35);
  createWheel(2.0, 0.5, -2.35);
  createWheel(-2.0, 0.5, 1.8);
  createWheel(2.0, 0.5, 1.8);

  car.position.set(0, 0, 5);
  scene.add(car);
}

function createWheel(x, y, z) {
  const tire = new THREE.Mesh(
    new THREE.CylinderGeometry(0.62, 0.62, 0.48, 40),
    new THREE.MeshStandardMaterial({
      color: 0x020617,
      roughness: 0.65,
      metalness: 0.15
    })
  );

  tire.rotation.z = Math.PI / 2;
  tire.position.set(x, y, z);
  tire.castShadow = true;
  car.add(tire);

  const rim = new THREE.Mesh(
    new THREE.CylinderGeometry(0.32, 0.32, 0.5, 32),
    new THREE.MeshStandardMaterial({
      color: 0x9ca3af,
      roughness: 0.22,
      metalness: 0.85
    })
  );

  rim.rotation.z = Math.PI / 2;
  rim.position.set(x, y, z);
  car.add(rim);
}

function createEnvironment() {
  const standMat = new THREE.MeshStandardMaterial({ color: 0x374151 });
  const roofMat = new THREE.MeshStandardMaterial({ color: 0xb91c1c });

  for (let i = 0; i < 8; i++) {
    const building = new THREE.Mesh(
      new THREE.BoxGeometry(5, 3, 5),
      standMat
    );
    building.position.set(-13, 1.5, -20 - i * 23);
    scene.add(building);

    const roof = new THREE.Mesh(
      new THREE.BoxGeometry(5.5, 0.3, 5.5),
      roofMat
    );
    roof.position.set(-13, 3.2, -20 - i * 23);
    scene.add(roof);
  }

  for (let i = 0; i < 20; i++) {
    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(0.45, 1.1, 10),
      new THREE.MeshStandardMaterial({ color: 0x16a34a })
    );
    cone.position.set(10 + Math.random() * 10, 0.55, -Math.random() * 220);
    scene.add(cone);
  }
}

function createObstacle() {
  const lanes = [-3.1, 0, 3.1];
  const x = lanes[Math.floor(Math.random() * lanes.length)];

  const obs = new THREE.Group();

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(1.8, 0.45, 3.4),
    new THREE.MeshStandardMaterial({
      color: Math.random() > 0.5 ? 0x111827 : 0x1d4ed8,
      roughness: 0.35,
      metalness: 0.45
    })
  );
  body.position.y = 0.55;
  body.castShadow = true;
  obs.add(body);

  const wing = new THREE.Mesh(
    new THREE.BoxGeometry(3.2, 0.15, 0.45),
    new THREE.MeshStandardMaterial({ color: 0x020617 })
  );
  wing.position.set(0, 1.05, 1.6);
  obs.add(wing);

  obs.position.set(x, 0, -115);
  scene.add(obs);
  obstacles.push(obs);
}

function moveCar() {
  if (keys["ArrowUp"] && speed < 0.9) speed += 0.006;
  if (keys["ArrowDown"] && speed > 0.15) speed -= 0.006;

  if (keys["ArrowLeft"] && car.position.x > -4.5) {
    car.position.x -= 0.095;
    car.rotation.z = 0.06;
  } else if (keys["ArrowRight"] && car.position.x < 4.5) {
    car.position.x += 0.095;
    car.rotation.z = -0.06;
  } else {
    car.rotation.z *= 0.88;
  }
}

function updateWorld() {
  scene.children.forEach(obj => {
    if (obj.name === "roadLine") {
      obj.position.z += speed * 4.5;
      if (obj.position.z > 15) obj.position.z = -290;
    }
  });

  obstacles.forEach(obs => {
    obs.position.z += speed * 4.5;

    if (
      Math.abs(car.position.x - obs.position.x) < 1.8 &&
      Math.abs(car.position.z - obs.position.z) < 3.2
    ) {
      gameOver = true;
      gameOverText.style.display = "block";
    }

    if (obs.position.z > 12 && !obs.scored) {
      score += 10;
      obs.scored = true;
      scoreText.innerText = score;
    }
  });

  obstacles = obstacles.filter(obs => {
    if (obs.position.z > 20) {
      scene.remove(obs);
      return false;
    }
    return true;
  });

  speedText.innerText = Math.floor(speed * 180);
}

function animate() {
  requestAnimationFrame(animate);

  if (!gameOver) {
    moveCar();
    updateWorld();
  }

  camera.position.x += (car.position.x * 0.55 - camera.position.x) * 0.08;
  camera.position.y = 2.25;
  camera.position.z = 9.2;
  camera.lookAt(car.position.x, 0.55, -14);

  renderer.render(scene, camera);
}

function restart() {
  obstacles.forEach(obs => scene.remove(obs));
  obstacles = [];

  score = 0;
  speed = 0.28;
  car.position.x = 0;
  car.rotation.z = 0;
  gameOver = false;

  scoreText.innerText = score;
  gameOverText.style.display = "none";
}

function resize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>
</body>
</html>
