<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>RC Car Racing Game</title>
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #1e293b, #020617);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      margin: 14px 0 6px;
      letter-spacing: 2px;
    }

    #gameBox {
      position: relative;
      width: 500px;
      margin: 0 auto;
    }

    canvas {
      background: #111827;
      border: 4px solid #38bdf8;
      border-radius: 14px;
      box-shadow: 0 0 30px rgba(56, 189, 248, 0.5);
    }

    #info {
      margin-top: 8px;
      font-size: 15px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>

  <h1>REALISTIC RC CAR GAME</h1>

  <div id="gameBox">
    <canvas id="gameCanvas" width="500" height="700"></canvas>
  </div>

  <div id="info">
    방향키 ← → 로 조종 / ↑ 가속 / ↓ 감속 / 장애물을 피하세요
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let keys = {};
    let score = 0;
    let gameOver = false;

    const road = {
      x: 90,
      width: 320
    };

    const car = {
      x: 230,
      y: 560,
      width: 42,
      height: 82,
      speed: 5
    };

    let laneLines = [];
    let obstacles = [];

    for (let i = 0; i < 10; i++) {
      laneLines.push({ x: 247, y: i * 90 });
    }

    function createObstacle() {
      const lanePositions = [125, 230, 335];
      const randomLane = lanePositions[Math.floor(Math.random() * lanePositions.length)];

      obstacles.push({
        x: randomLane,
        y: -100,
        width: 50,
        height: 80,
        color: Math.random() > 0.5 ? "#ef4444" : "#f97316"
      });
    }

    setInterval(() => {
      if (!gameOver) createObstacle();
    }, 1200);

    document.addEventListener("keydown", (e) => {
      keys[e.key] = true;
      if (gameOver && e.key === "Enter") restartGame();
    });

    document.addEventListener("keyup", (e) => {
      keys[e.key] = false;
    });

    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
      sky.addColorStop(0, "#0f172a");
      sky.addColorStop(1, "#020617");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#14532d";
      ctx.fillRect(0, 0, road.x, canvas.height);
      ctx.fillRect(road.x + road.width, 0, road.x, canvas.height);

      for (let i = 0; i < 25; i++) {
        ctx.fillStyle = i % 2 === 0 ? "#166534" : "#15803d";
        ctx.beginPath();
        ctx.arc(35, i * 40 + 10, 14, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(465, i * 40 + 20, 14, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawRoad() {
      const roadGradient = ctx.createLinearGradient(road.x, 0, road.x + road.width, 0);
      roadGradient.addColorStop(0, "#1f2937");
      roadGradient.addColorStop(0.5, "#374151");
      roadGradient.addColorStop(1, "#1f2937");

      ctx.fillStyle = roadGradient;
      ctx.fillRect(road.x, 0, road.width, canvas.height);

      ctx.fillStyle = "#e5e7eb";
      ctx.fillRect(road.x, 0, 6, canvas.height);
      ctx.fillRect(road.x + road.width - 6, 0, 6, canvas.height);

      ctx.strokeStyle = "#facc15";
      ctx.lineWidth = 5;

      laneLines.forEach(line => {
        ctx.beginPath();
        ctx.moveTo(line.x, line.y);
        ctx.lineTo(line.x, line.y + 45);
        ctx.stroke();

        line.y += car.speed;

        if (line.y > canvas.height) {
          line.y = -90;
        }
      });
    }

    function drawCar() {
      ctx.save();
      ctx.translate(car.x + car.width / 2, car.y + car.height / 2);

      const bodyGradient = ctx.createLinearGradient(-25, -40, 25, 40);
      bodyGradient.addColorStop(0, "#38bdf8");
      bodyGradient.addColorStop(0.5, "#2563eb");
      bodyGradient.addColorStop(1, "#1e3a8a");

      ctx.fillStyle = "#020617";
      ctx.fillRect(-28, -36, 8, 22);
      ctx.fillRect(20, -36, 8, 22);
      ctx.fillRect(-28, 15, 8, 25);
      ctx.fillRect(20, 15, 8, 25);

      ctx.fillStyle = bodyGradient;
      roundRect(ctx, -21, -41, 42, 82, 10);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.75)";
      roundRect(ctx, -14, -28, 28, 22, 6);
      ctx.fill();

      ctx.fillStyle = "#0f172a";
      roundRect(ctx, -15, 2, 30, 24, 7);
      ctx.fill();

      ctx.fillStyle = "#fef08a";
      ctx.fillRect(-15, -43, 9, 5);
      ctx.fillRect(6, -43, 9, 5);

      ctx.restore();
    }

    function drawObstacles() {
      obstacles.forEach(obs => {
        const gradient = ctx.createLinearGradient(obs.x, obs.y, obs.x + obs.width, obs.y + obs.height);
        gradient.addColorStop(0, "#fca5a5");
        gradient.addColorStop(0.5, obs.color);
        gradient.addColorStop(1, "#7f1d1d");

        ctx.fillStyle = "#020617";
        ctx.fillRect(obs.x - 6, obs.y + 8, 6, 20);
        ctx.fillRect(obs.x + obs.width, obs.y + 8, 6, 20);
        ctx.fillRect(obs.x - 6, obs.y + 52, 6, 20);
        ctx.fillRect(obs.x + obs.width, obs.y + 52, 6, 20);

        ctx.fillStyle = gradient;
        roundRect(ctx, obs.x, obs.y, obs.width, obs.height, 9);
        ctx.fill();

        ctx.fillStyle = "rgba(255,255,255,0.7)";
        roundRect(ctx, obs.x + 10, obs.y + 10, obs.width - 20, 18, 5);
        ctx.fill();

        obs.y += car.speed;

        if (obs.y > canvas.height) {
          score += 10;
        }
      });

      obstacles = obstacles.filter(obs => obs.y < canvas.height + 100);
    }

    function moveCar() {
      if (keys["ArrowLeft"] && car.x > road.x + 12) {
        car.x -= 6;
      }

      if (keys["ArrowRight"] && car.x + car.width < road.x + road.width - 12) {
        car.x += 6;
      }

      if (keys["ArrowUp"] && car.speed < 12) {
        car.speed += 0.08;
      }

      if (keys["ArrowDown"] && car.speed > 3) {
        car.speed -= 0.08;
      }
    }

    function checkCollision() {
      obstacles.forEach(obs => {
        if (
          car.x < obs.x + obs.width &&
          car.x + car.width > obs.x &&
          car.y < obs.y + obs.height &&
          car.y + car.height > obs.y
        ) {
          gameOver = true;
        }
      });
    }

    function drawScore() {
      ctx.fillStyle = "white";
      ctx.font = "20px Arial";
      ctx.fillText("SCORE : " + score, 20, 35);
      ctx.fillText("SPEED : " + car.speed.toFixed(1), 360, 35);
    }

    function drawGameOver() {
      ctx.fillStyle = "rgba(0,0,0,0.75)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#f87171";
      ctx.font = "42px Arial";
      ctx.fillText("GAME OVER", 125, 320);

      ctx.fillStyle = "white";
      ctx.font = "22px Arial";
      ctx.fillText("최종 점수 : " + score, 180, 365);
      ctx.fillText("Enter 키를 누르면 다시 시작", 125, 410);
    }

    function restartGame() {
      score = 0;
      gameOver = false;
      car.x = 230;
      car.speed = 5;
      obstacles = [];
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function gameLoop() {
      drawBackground();
      drawRoad();
      moveCar();
      drawObstacles();
      drawCar();
      drawScore();
      checkCollision();

      if (gameOver) {
        drawGameOver();
      } else {
        requestAnimationFrame(gameLoop);
      }
    }

    gameLoop();
  </script>

</body>
</html>
